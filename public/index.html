<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunPod Image Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    .titlebar {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .credits {
      font-size: 0.8rem;
      color: #888;
    }

    .credits span {
      color: #4ade80;
      font-weight: 600;
    }

    /* ── Main workspace ── */
    .workspace {
      display: flex;
      gap: 2rem;
      width: 100%;
      max-width: 1100px;
      align-items: flex-start;
    }

    /* ── Left panel: form ── */
    .panel-form {
      flex: 0 0 340px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #aaa;
      display: block;
      margin-bottom: 0.3rem;
    }

    textarea, input[type="number"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.9rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus, input[type="number"]:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 120px; }

    .row { display: flex; gap: 0.75rem; }
    .row > div { flex: 1; }

    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #4f52d3; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-download {
      display: none;
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #444;
      border-radius: 8px;
      background: transparent;
      color: #aaa;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-download:hover { border-color: #6366f1; color: #fff; }

    /* ── Right panel: image ── */
    .panel-image {
      flex: 1;
      min-height: 400px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .panel-image img { width: 100%; height: auto; display: block; border-radius: 12px; }

    .placeholder { color: #555; font-size: 0.9rem; text-align: center; padding: 2rem; }

    .status-bar {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #888;
      min-height: 1.2em;
      text-align: center;
    }
    .status-bar.error { color: #f87171; }
    .status-bar.success { color: #4ade80; }

    .spinner {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6); border-radius: 12px;
    }
    .spinner.active { display: flex; }
    .spinner-ring {
      width: 48px; height: 48px;
      border: 4px solid #333; border-top-color: #6366f1;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── History section ── */
    .history-section {
      width: 100%;
      max-width: 1100px;
      margin-top: 3rem;
    }

    .history-header {
      font-size: 0.75rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid #222;
    }

    .history-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .history-card {
      display: flex;
      gap: 1rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s;
      align-items: center;
    }
    .history-card:hover { border-color: #6366f1; }

    .history-thumb {
      width: 88px;
      height: 88px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
      background: #111;
    }

    .history-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      overflow: hidden;
      min-width: 0;
    }

    .history-prompt {
      font-size: 0.88rem;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-negative {
      font-size: 0.75rem;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-time {
      font-size: 0.72rem;
      color: #444;
      margin-top: auto;
      padding-top: 0.25rem;
    }

    .history-actions { flex-shrink: 0; }

    .history-dl {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: transparent;
      color: #777;
      font-size: 0.75rem;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .history-dl:hover { border-color: #6366f1; color: #fff; }

    .history-empty { color: #333; font-size: 0.85rem; padding: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="titlebar">
    <h1>RunPod Image Generator</h1>
    <div class="credits" id="creditsDisplay">Credits: …</div>
  </div>

  <div class="workspace">
    <!-- Left: form -->
    <div class="panel-form">
      <div>
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="a photo of an astronaut riding a horse on mars">a photo of an astronaut riding a horse on mars</textarea>
      </div>
      <div>
        <label for="negative">Negative Prompt</label>
        <textarea id="negative" style="min-height:70px">text, watermark, blurry, ugly, deformed</textarea>
      </div>
      <div class="row">
        <div>
          <label for="width">Width</label>
          <input type="number" id="width" value="1024" min="64" max="2048" step="64" />
        </div>
        <div>
          <label for="height">Height</label>
          <input type="number" id="height" value="1024" min="64" max="2048" step="64" />
        </div>
      </div>
      <div class="row">
        <div>
          <label for="steps">Steps</label>
          <input type="number" id="steps" value="20" min="1" max="150" />
        </div>
        <div>
          <label for="guidance">Guidance</label>
          <input type="number" id="guidance" value="3.5" min="1" max="20" step="0.5" />
        </div>
      </div>
      <button id="generateBtn" onclick="generate()">Generate</button>
      <a id="downloadBtn" class="btn-download">Download</a>
      <div class="status-bar" id="status">Ready</div>
    </div>

    <!-- Right: image -->
    <div class="panel-image" id="imagePanel">
      <div class="placeholder" id="placeholder">Your image will appear here</div>
      <div class="spinner" id="spinner"><div class="spinner-ring"></div></div>
      <img id="resultImg" style="display:none" alt="Generated image" />
    </div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">History</div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No history yet.</div>
    </div>
  </div>

  <script>
    const POLL_INTERVAL_MS = 2000;
    let historyEntries = [];

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status-bar' + (type ? ' ' + type : '');
    }

    function setLoading(loading) {
      document.getElementById('generateBtn').disabled = loading;
      document.getElementById('spinner').classList.toggle('active', loading);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showImage(dataUrl, filename) {
      const img = document.getElementById('resultImg');
      img.src = dataUrl;
      img.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      const dl = document.getElementById('downloadBtn');
      dl.href = dataUrl;
      dl.download = filename;
      dl.style.display = 'block';
    }

    function loadFromHistory(id) {
      const entry = historyEntries.find(e => e.id === id);
      if (!entry) return;
      showImage('data:image/png;base64,' + entry.image, entry.filename);
      document.getElementById('prompt').value = entry.prompt;
      document.getElementById('negative').value = entry.negative_prompt || '';
      setStatus('Loaded from history', 'success');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function refreshHistory() {
      try {
        const res = await fetch('/api/history');
        historyEntries = await res.json();
        const list = document.getElementById('historyList');
        if (!historyEntries.length) {
          list.innerHTML = '<div class="history-empty">No history yet.</div>';
          return;
        }
        list.innerHTML = historyEntries.map(e => `
          <div class="history-card" onclick="loadFromHistory(${e.id})">
            <img class="history-thumb" src="data:image/png;base64,${e.image}" alt="" />
            <div class="history-meta">
              <div class="history-prompt">${escapeHtml(e.prompt)}</div>
              ${e.negative_prompt ? `<div class="history-negative">− ${escapeHtml(e.negative_prompt)}</div>` : ''}
              <div class="history-time">${new Date(e.timestamp).toLocaleString()}</div>
            </div>
            <div class="history-actions">
              <a class="history-dl" href="data:image/png;base64,${e.image}"
                 download="${escapeHtml(e.filename || 'image.png')}"
                 onclick="event.stopPropagation()">Download</a>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.warn('History load failed:', err);
      }
    }

    async function saveToHistory({ prompt, negative_prompt, filename, image }) {
      try {
        await fetch('/api/history', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, negative_prompt, filename, image, timestamp: new Date().toISOString() }),
        });
        await refreshHistory();
      } catch (err) {
        console.warn('History save failed:', err);
      }
    }

    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) { setStatus('Please enter a prompt.', 'error'); return; }

      setLoading(true);
      setStatus('Submitting job…');
      document.getElementById('resultImg').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
      document.getElementById('downloadBtn').style.display = 'none';

      let jobId;
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt,
            negative_prompt: document.getElementById('negative').value,
            width: parseInt(document.getElementById('width').value),
            height: parseInt(document.getElementById('height').value),
            steps: parseInt(document.getElementById('steps').value),
            guidance: parseFloat(document.getElementById('guidance').value),
          }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        jobId = data.id;
        setStatus(`Job submitted — polling (id: ${jobId})…`);
      } catch (err) {
        setStatus('Submission failed: ' + err.message, 'error');
        setLoading(false);
        return;
      }

      let attempts = 0;
      const poll = async () => {
        attempts++;
        try {
          const res = await fetch(`/api/status/${jobId}`);
          const data = await res.json();
          const status = data.status;

          if (status === 'IN_QUEUE' || status === 'IN_PROGRESS') {
            setStatus(`Status: ${status} (attempt ${attempts})…`);
            setTimeout(poll, POLL_INTERVAL_MS);
          } else if (status === 'COMPLETED') {
            const imageEntry = data.output?.images?.[0];
            if (!imageEntry?.data) throw new Error('No image in response');
            showImage('data:image/png;base64,' + imageEntry.data, imageEntry.filename);
            setStatus('Done!', 'success');
            setLoading(false);
            await saveToHistory({
              prompt,
              negative_prompt: document.getElementById('negative').value,
              filename: imageEntry.filename,
              image: imageEntry.data,
            });
            refreshCredits();
          } else if (status === 'FAILED') {
            throw new Error(`Job failed: ${data.error || JSON.stringify(data.output) || 'no details'}`);
          } else {
            throw new Error(`Unexpected status: ${status}`);
          }
        } catch (err) {
          setStatus('Error: ' + err.message, 'error');
          setLoading(false);
        }
      };

      setTimeout(poll, POLL_INTERVAL_MS);
    }

    async function refreshCredits() {
      const el = document.getElementById('creditsDisplay');
      try {
        const res = await fetch('/api/credits');
        const data = await res.json();
        if (data.credits != null) {
          el.innerHTML = `Credits: <span style="color:#4ade80;font-weight:600">$${data.credits}</span>`;
        } else {
          el.textContent = 'Credits: —';
        }
      } catch {
        el.textContent = 'Credits: —';
      }
    }

    // Load history and credits on page init
    refreshHistory();
    refreshCredits();
  </script>
</body>
</html>
