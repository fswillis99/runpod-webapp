<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RunPod Image Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .workspace {
      display: flex;
      gap: 2rem;
      width: 100%;
      max-width: 1100px;
      align-items: flex-start;
    }

    /* ── Left panel: form ── */
    .panel-form {
      flex: 0 0 340px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #aaa;
      display: block;
      margin-bottom: 0.3rem;
    }

    textarea, input[type="number"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.9rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus, input[type="number"]:focus {
      border-color: #6366f1;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .row {
      display: flex;
      gap: 0.75rem;
    }

    .row > div { flex: 1; }

    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #4f52d3; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Right panel: image ── */
    .panel-image {
      flex: 1;
      min-height: 400px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .panel-image img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    .placeholder {
      color: #555;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }

    /* ── Status bar ── */
    .status-bar {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #888;
      min-height: 1.2em;
      text-align: center;
    }

    .status-bar.error { color: #f87171; }
    .status-bar.success { color: #4ade80; }

    /* ── Spinner overlay ── */
    .spinner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
    }

    .spinner.active { display: flex; }

    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>RunPod Image Generator</h1>

  <div class="workspace">
    <!-- Left: form -->
    <div class="panel-form">
      <div>
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="a photo of an astronaut riding a horse on mars">a photo of an astronaut riding a horse on mars</textarea>
      </div>

      <div>
        <label for="negative">Negative Prompt</label>
        <textarea id="negative" style="min-height:70px">blurry, bad quality</textarea>
      </div>

      <div class="row">
        <div>
          <label for="width">Width</label>
          <input type="number" id="width" value="512" min="64" max="1024" step="64" />
        </div>
        <div>
          <label for="height">Height</label>
          <input type="number" id="height" value="512" min="64" max="1024" step="64" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="steps">Steps</label>
          <input type="number" id="steps" value="20" min="1" max="150" />
        </div>
        <div>
          <label for="guidance">Guidance Scale</label>
          <input type="number" id="guidance" value="7.5" min="1" max="20" step="0.5" />
        </div>
      </div>

      <button id="generateBtn" onclick="generate()">Generate</button>
      <div class="status-bar" id="status">Ready</div>
    </div>

    <!-- Right: image -->
    <div class="panel-image" id="imagePanel">
      <div class="placeholder" id="placeholder">Your image will appear here</div>
      <div class="spinner" id="spinner"><div class="spinner-ring"></div></div>
      <img id="resultImg" style="display:none" alt="Generated image" />
    </div>
  </div>

  <script>
    const POLL_INTERVAL_MS = 2000;

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status-bar' + (type ? ' ' + type : '');
    }

    function setLoading(loading) {
      document.getElementById('generateBtn').disabled = loading;
      document.getElementById('spinner').classList.toggle('active', loading);
    }

    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) { setStatus('Please enter a prompt.', 'error'); return; }

      setLoading(true);
      setStatus('Submitting job…');
      document.getElementById('resultImg').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';

      let jobId;
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt,
            negative_prompt: document.getElementById('negative').value,
            width: parseInt(document.getElementById('width').value),
            height: parseInt(document.getElementById('height').value),
            steps: parseInt(document.getElementById('steps').value),
            guidance_scale: parseFloat(document.getElementById('guidance').value),
          }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        jobId = data.id;
        setStatus(`Job submitted — polling (id: ${jobId})…`);
      } catch (err) {
        setStatus('Submission failed: ' + err.message, 'error');
        setLoading(false);
        return;
      }

      // Poll until complete
      let attempts = 0;
      const poll = async () => {
        attempts++;
        try {
          const res = await fetch(`/api/status/${jobId}`);
          const data = await res.json();
          const status = data.status;

          if (status === 'IN_QUEUE' || status === 'IN_PROGRESS') {
            setStatus(`Status: ${status} (attempt ${attempts})…`);
            setTimeout(poll, POLL_INTERVAL_MS);
          } else if (status === 'COMPLETED') {
            const b64 = data.output?.images?.[0];
            if (!b64) throw new Error('No image in response');
            const img = document.getElementById('resultImg');
            img.src = 'data:image/png;base64,' + b64;
            img.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            setStatus('Done!', 'success');
            setLoading(false);
          } else {
            throw new Error(`Unexpected status: ${status}`);
          }
        } catch (err) {
          setStatus('Error: ' + err.message, 'error');
          setLoading(false);
        }
      };

      setTimeout(poll, POLL_INTERVAL_MS);
    }
  </script>
</body>
</html>
